solon.logging.appender:
  console:
    enable: false # 是否启用控制台日志（启用后，会对 cli console 有干扰）
  file:
    level: INFO

solon.code.cli:
  workDir: "work" # 工作区目录
  maxSteps: 30 # ReAct 最大循环步数
  maxStepsAutoExtensible: true #最大步数自动续航（由 LLM 反思控制）
  sessionWindowSize: 10 # 会话历史窗口大小（即，新指令时使用几条历史消息）

  hitlEnabled: true # 是否启用人工审核危险操作，和 maxSteps 动态继步

  sandboxMode: true # 消盒模式，启用时禁止访问绝对路径
  thinkPrinted: true # 内心思考，是否打印

  cliEnabled: true # 是否启用控制台
  cliPrintSimplified: true

  webEnabled: false # 是否启用 WebApi
  webEndpoint: "/cli"

  acpEnabled: false # 是否启用 Acp 协议（一些支持 Acp 的 IDE 可以连接）
  acpTransport: "websocket" # "stdio" or "websocket"
  acpEndpoint: "/acp"

  subAgentEnabled: true

  # SubAgent 模型配置（可选）
  # 如果不配置，将使用 chatModel.model 作为默认值
  # subAgentModels:
  #   explore: "glm-4-flash"       # 探索代理使用快速模型
  #   plan: "glm-4.7"              # 计划代理使用推理模型
  #   bash: "glm-4-flash"           # Bash代理使用快速模型
  #   general-purpose: "glm-4.7"  # 通用代理使用推理模型
  #   solon-code-guide: "glm-4.7" # Solon指南代理使用推理模型

  # Agent Teams 增强功能配置
  # 共享记忆功能：允许子代理之间共享信息和知识
  sharedMemoryEnabled: true
  sharedMemory:
    shortTermTtl: 3600000          # 短期记忆TTL（毫秒，默认1小时）
    longTermTtl: 604800000         # 长期记忆TTL（毫秒，默认7天）
    cleanupInterval: 300000        # 清理间隔（毫秒，默认5分钟）
    persistOnWrite: true           # 写入时立即持久化
    maxShortTermCount: 1000        # 短期记忆最大数量
    maxLongTermCount: 500          # 长期记忆最大数量

  # 事件总线功能：基于事件的异步通信
  eventBusEnabled: true
  eventBus:
    asyncThreads: 4                # 异步处理线程数（默认CPU核心数）
    maxHistorySize: 1000           # 事件历史最大数量
    defaultPriority: 5             # 默认优先级（0-10）
    timeoutSeconds: 30             # 处理超时时间（秒）

  # 消息通道功能：代理之间的直接消息传递
  messageChannelEnabled: true
  messageChannel:
    threads: 4                     # 处理线程数
    defaultTtl: 60000              # 默认消息TTL（毫秒，默认60秒）
    maxQueueSize: 1000             # 每个代理的最大队列长度
    persistMessages: true          # 是否持久化消息

  chatModel: # llm 配置（参考 solon ai chatmodel 配置）
    apiUrl: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
    apiKey: "1c6ec604ad0644e09384103437643a7c.Mu9Mof2ge3KWbkGN"
    model: "glm-4.7"
    userAgent: "Mozilla/5.0 AppleWebKit/537.36 (KHTML, like Gecko; compatible; SolonCode/1.0; +https://solon.noear.org/)"
  #    defaultOptions:
  #      enable_thinking: false #不同模型可能不同
  #      temperature: 0.2
  #      top_p: 0.5
  #      frequency_penalty: 0.5
  #      presence_penalty: 0.4
  skillPools: # 技能池（可以多个）
    "@shared": "/path/to/shared-skills"
#  mcpServers:
#    gitee:
#      url: "http://..."
#      headers: { API_KEY: "xxx" }
#    memory:
#      command: "npx"
#      args: [ "-y", "@modelcontextprotocol/server-memory" ]

# 1. chatModel 按需配置，不熟的看下 solon ai 官网资料
# 2. SolonCodeCLI 兼容 Claude Code Agent Skills